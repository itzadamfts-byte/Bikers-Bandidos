<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biker Bandidos – Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Lato:wght@300;400;700&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4AF37;
    --gold-light: #f0c060;
    --red: #b01010;
    --bg-dark: #080808;
    --border: #7a4a10;
    --text-main: #e8d8b0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #070606;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px 10px 40px;
    font-family: 'Lato', sans-serif;
  }

  .menu-wrapper {
    width: 100%;
    max-width: 450px;
    position: relative;
  }

  .frame {
    border: 3px solid transparent;
    border-radius: 8px;
    padding: 4px;
    background:
      linear-gradient(#070606, #070606) padding-box,
      linear-gradient(145deg, #ff8c00 0%, #7a3800 45%, #ff9500 55%, #8a4000 100%) border-box;
    box-shadow: 0 0 25px rgba(200,90,0,0.35);
  }

  .frame-inner {
    border: 1px solid rgba(180,80,0,0.3);
    border-radius: 4px;
    padding: 20px 16px 30px;
    background: #070606;
  }

  .header-title {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: 10px;
    color: var(--text-main);
    margin-bottom: 18px;
  }

  .logo-area {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  .logo-img {
    width: 180px;
    height: auto;
  }

  /* --- Estilos de la Tabla de Precios --- */
  .price-header {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
    padding-right: 2px;
  }

  .header-col {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--gold);
    width: 70px; /* Ancho fijo para columnas de precio */
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .category-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    letter-spacing: 3px;
    color: var(--gold-light);
    text-transform: uppercase;
    border-bottom: 1px solid rgba(120,70,10,0.5);
    margin-bottom: 10px;
    padding-bottom: 4px;
  }

  .item {
    display: flex;
    align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px solid rgba(80,40,0,0.2);
  }

  .item-name {
    flex: 1;
    font-size: 15px;
    color: var(--text-main);
    padding-right: 10px;
  }

  .price-col {
    width: 70px; /* Debe coincidir con header-col */
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: var(--gold);
  }

  .footer {
    margin-top: 30px;
    text-align: center;
    color: var(--gold);
    font-family: 'Pinyon Script', cursive;
    font-size: 22px;
  }
</style>
</head>
<body>

<div class="menu-wrapper">
  <div class="frame">
    <div class="frame-inner">
      
      <div class="header-title">BIKER BANDIDOS</div>

      <div class="logo-area">
        <img class="logo-img" src="data:image/jpeg;base64,...(tu-base64)..." alt="Logo">
      </div>

      <div class="price-header">
        <div class="header-col">1/2 Litro</div>
        <div class="header-col">1 Lt</div>
      </div>

      <div class="category">
        <div class="category-header">Cervezas & Preparados</div>
        
        <div class="item">
          <span class="item-name">Michelada Especial</span>
          <span class="price-col">$55</span>
          <span class="price-col">$95</span>
        </div>

        <div class="item">
          <span class="item-name">Clamato Preparado</span>
          <span class="price-col">$60</span>
          <span class="price-col">$110</span>
        </div>

        <div class="item">
          <span class="item-name">Cerveza de Barril</span>
          <span class="price-col">$45</span>
          <span class="price-col">$80</span>
        </div>
      </div>

      <div class="footer">
        Disfruta el camino...
      </div>

    </div>
  </div>
</div>

</body>
</html>
