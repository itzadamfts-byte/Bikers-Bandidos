<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biker Bandidos – Menú</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@800&family=Lato:wght@300;400;700&display=swap');

  :root {
    --gold: #D4AF37;
    --gold-light: #f0c060;
    --red: #b01010;
    --red-bright: #e82020;
    --bg-dark: #080808;
    --border: #7a4a10;
    --text-main: #e8d8b0;
    --text-dim: #a08050;
    --star: #e03030;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #070606;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px 10px 40px;
    font-family: 'Lato', sans-serif;
  }

  .menu-wrapper {
    width: 100%;
    max-width: 420px;
    position: relative;
  }

  .frame {
    border: 3px solid transparent;
    border-radius: 8px;
    padding: 4px;
    background:
      linear-gradient(#070606, #070606) padding-box,
      linear-gradient(145deg,
        #ff8c00 0%,
        #c85a00 15%,
        #e87820 30%,
        #7a3800 45%,
        #ff9500 55%,
        #b85000 70%,
        #f07010 85%,
        #8a4000 100%
      ) border-box;
    box-shadow:
      0 0 0 1px rgba(255,120,0,0.15),
      0 0 25px rgba(200,90,0,0.35),
      0 0 60px rgba(150,60,0,0.15),
      inset 0 0 20px rgba(0,0,0,0.9);
    animation: fadeIn 1s ease forwards;
  }

  .frame-inner {
    border: 1px solid rgba(180,80,0,0.3);
    border-radius: 4px;
    padding: 20px 16px 30px;
    position: relative;
    overflow: hidden;
    background: #070606;
  }

  .header-title {
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: 10px;
    color: var(--text-main);
    text-shadow: 0 0 20px rgba(200,146,42,0.4);
    margin-bottom: 18px;
  }

  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
  }

  .logo-img {
    width: 200px;
    height: 200px;
    object-fit: contain;
    opacity: 0.92;
  }

  /* --- NUEVO: Encabezado de columnas de precio --- */
  .price-headers {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 5px;
    padding-right: 2px;
  }

  .header-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 11px;
    color: var(--gold);
    width: 52px;
    text-align: right;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .category-header {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 4px;
    color: var(--gold-light);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(120,70,10,0.5);
  }

  .item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 2px;
    border-bottom: 1px solid rgba(80,40,0,0.25);
  }

  .item-name {
    font-family: 'Lato', sans-serif;
    font-weight: 400;
    font-size: 14px;
    color: var(--text-main);
    letter-spacing: 0.5px;
    flex: 1;
  }

  .item-dots {
    border-bottom: 1px dotted rgba(180,120,40,0.25);
    flex: 1;
    min-width: 10px;
    margin-bottom: 2px;
  }

  .item-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: #D4AF37;
    width: 52px; /* Ancho fijo para que se alineen con el encabezado */
    text-align: right;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .footer {
    margin-top: 24px;
    text-align: center;
  }

  .footer-eventos {
    font-family: 'Pinyon Script', cursive;
    font-size: 20px;
    color: #D4AF37;
    margin-bottom: 10px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
</head>
<body>

<div class="menu-wrapper">
  <div class="frame">
    <div class="frame-inner">

      <div class="header-title">BIKER BANDIDOS</div>

      <div class="logo-area">
        <img class="logo-img" src="data:image/jpeg;base64,/9j/..." alt="Logo">
      </div>

      <div class="category">
        <div class="category-header">Bebidas</div>
        
        <div class="price-headers">
          <div class="header-label">1/2 litro</div>
          <div class="header-label">1 Lt</div>
        </div>

        <div class="item">
          <span class="item-name">Michelada</span>
          <div class="item-dots"></div>
          <span class="item-price">$60</span>
          <span class="item-price">$110</span>
        </div>

        <div class="item">
          <span class="item-name">Clamato</span>
          <div class="item-dots"></div>
          <span class="item-price">$70</span>
          <span class="item-price">$130</span>
        </div>
      </div>

      <div class="footer">
        <div class="footer-eventos">Disfruta el camino...</div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
